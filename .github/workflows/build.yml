name: Build

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

jobs:
  app-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/d76riders?schema=public
        run: npx prisma generate

      - name: Lint (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/d76riders?schema=public
          NEXT_PUBLIC_MAPTILER_KEY: test
        run: npm run build
