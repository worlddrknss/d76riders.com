name: CI

# Quality gate on every push to main and every pull request: lint, unit tests,
# and a full build (which type-checks). Blocking — unlike the tag-only build.yml.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/d76riders?schema=public
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (type-check + compile)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/d76riders?schema=public
          NEXT_PUBLIC_MAPTILER_KEY: test
        run: npm run build
